services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ships-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@ships-db:5432/${POSTGRES_DB}
      REDIS_URL: redis://ships-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      ships-db:
        condition: service_healthy
      ships-redis:
        condition: service_healthy
    restart: unless-stopped

  ships-db:
    image: postgres:16-alpine
    container_name: ships-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ships-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ships-redis:
    image: redis:7-alpine
    container_name: ships-redis
    ports:
      - "6379:6379"
    volumes:
      - ships-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bull-board:
    image: deadly0/bull-board
    container_name: ships-bull-board
    ports:
      - "3010:3000"
    environment:
      REDIS_HOST: ships-redis
      REDIS_PORT: 6379
    depends_on:
      ships-redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ships-db-data:
  ships-redis-data: