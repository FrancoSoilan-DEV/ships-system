<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ships System - Login</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-container">

    <!-- Logo -->
    <a href="/" class="auth-logo">⚓ Ships System</a>

    <!-- Card -->
    <div class="auth-card">

      <div class="auth-card-header">
        <h2 data-i18n="auth.title">Bienvenido de vuelta</h2>
        <p data-i18n="auth.subtitle">Ingresá con las credenciales que te envió el asistente.</p>
      </div>

      <!-- LOGIN FORM -->
      <div class="auth-form" id="form-login">
        <div class="form-group">
          <label data-i18n="auth.email">Correo electrónico</label>
          <input type="email" id="login-email" data-i18n-placeholder="auth.email.placeholder" placeholder="tu@email.com" />
        </div>
        <div class="form-group">
          <label data-i18n="auth.password">Contraseña</label>
          <input type="password" id="login-password" data-i18n-placeholder="auth.password.placeholder" placeholder="••••••••" />
        </div>
        <div class="form-error hidden" id="login-error"></div>
        <button class="btn-primary btn-full" id="btn-login" data-i18n="auth.login.btn">Iniciar sesión</button>
      </div>

      <div class="auth-footer">
        <p data-i18n="auth.no.account">¿No tenés cuenta? Pedísela a nuestra IA. <a href="/" data-i18n="auth.talk.ai">Hablar con la IA</a></p>
        <button class="lang-toggle" id="lang-toggle">🌐 EN</button>
      </div>

    </div>
  </div>

  <script src="/js/i18n.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
